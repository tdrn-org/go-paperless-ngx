          enum:
          - FAILURE
          - PENDING
          - RECEIVED
          - RETRY
          - REVOKED
          - STARTED
          - SUCCESS
        description: |-
          Current state of the task being run

          * `FAILURE` - FAILURE
          * `PENDING` - PENDING
          * `RECEIVED` - RECEIVED
          * `RETRY` - RETRY
          * `REVOKED` - REVOKED
          * `STARTED` - STARTED
          * `SUCCESS` - SUCCESS
      - in: query
        name: task_id
        schema:
          type: string
        description: Filter tasks by Celery UUID
      - in: query
        name: task_name
        schema:
          type: string
          nullable: true
          enum:
          - check_sanity
          - consume_file
          - index_optimize
          - train_classifier
        description: |-
          Name of the task that was run

          * `consume_file` - Consume File
          * `train_classifier` - Train Classifier
          * `check_sanity` - Check Sanity
          * `index_optimize` - Index Optimize
      - in: query
        name: type
        schema:
          type: string
          title: Task Type
          enum:
          - auto_task
          - manual_task
          - scheduled_task
        description: |-
          The type of task that was run

          * `auto_task` - Auto Task
          * `scheduled_task` - Scheduled Task
          * `manual_task` - Manual Task
