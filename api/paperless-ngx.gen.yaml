components:
  schemas:
    AccountTypeEnum:
      enum:
      - 1
      - 2
      - 3
      type: integer
      description: |-
        * `1` - IMAP
        * `2` - Gmail-OAuth
        * `3` - Outlook-OAuth
    AcknowledgeTasks:
      type: object
      properties:
        result:
          type: integer
      required:
      - result
    Actor:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required:
      - id
      - username
    ApplicationConfiguration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_args:
          nullable: true
        barcode_tag_mapping:
          nullable: true
        output_type:
          nullable: true
          title: Legt den PDF-Typ der Ausgabedatei fest
          oneOf:
          - $ref: '#/components/schemas/OutputTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        pages:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
          title: OCR von Seite 1 bis zu diesem Wert durchführen
        language:
          type: string
          nullable: true
          title: OCR für diese Sprachen durchführen
          maxLength: 32
        mode:
          nullable: true
          title: Legt den OCR-Modus fest
          oneOf:
          - $ref: '#/components/schemas/ModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        skip_archive_file:
          nullable: true
          title: Steuert die Erzeugung einer Archivdatei
          oneOf:
          - $ref: '#/components/schemas/SkipArchiveFileEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        image_dpi:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
          title: Setzt den Bild-DPI Fallback-Wert
        unpaper_clean:
          nullable: true
          title: Steuert die unpaper-Bereinigung
          oneOf:
          - $ref: '#/components/schemas/UnpaperCleanEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        deskew:
          type: boolean
          nullable: true
          title: Aktiviert die Schräglagenkorrektur
        rotate_pages:
          type: boolean
          nullable: true
          title: Aktiviert Seitenrotation
        rotate_pages_threshold:
          type: number
          format: double
          minimum: 0.0
          nullable: true
          title: Legt die Schwelle für die Seitenrotation fest
        max_image_pixels:
          type: number
          format: double
          minimum: 0.0
          nullable: true
          title: Legt die maximale Bildgröße für die Dekomprimierung fest
        color_conversion_strategy:
          nullable: true
          title: Legt die Ghostscript-Farbkonvertierungsstrategie fest
          oneOf:
          - $ref: '#/components/schemas/ColorConversionStrategyEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        app_title:
          type: string
          nullable: true
          title: Anwendungstitel
          maxLength: 48
        app_logo:
          type: string
          format: uri
          nullable: true
          title: Anwendungslogo
          pattern: (?:jpg|png|gif|svg)$
        barcodes_enabled:
          type: boolean
          nullable: true
          title: Aktiviert Barcode-Scan
        barcode_enable_tiff_support:
          type: boolean
          nullable: true
          title: Aktiviert Barcode-TIFF-Unterstützung
        barcode_string:
          type: string
          nullable: true
