components:
  schemas:
    AccountTypeEnum:
      enum:
      - 1
      - 2
      - 3
      type: integer
      description: |-
        * `1` - IMAP
        * `2` - Gmail OAuth
        * `3` - Outlook OAuth
    AcknowledgeTasks:
      type: object
      properties:
        result:
          type: integer
      required:
      - result
    Actor:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required:
      - id
      - username
    ApplicationConfiguration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_args:
          nullable: true
        barcode_tag_mapping:
          nullable: true
        output_type:
          nullable: true
          title: Sets the output PDF type
          oneOf:
          - $ref: '#/components/schemas/OutputTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        pages:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
          title: Do OCR from page 1 to this value
        language:
          type: string
          nullable: true
          title: Do OCR using these languages
          maxLength: 32
        mode:
          nullable: true
          title: Sets the OCR mode
          oneOf:
          - $ref: '#/components/schemas/ModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        skip_archive_file:
          nullable: true
          title: Controls the generation of an archive file
          oneOf:
          - $ref: '#/components/schemas/SkipArchiveFileEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        image_dpi:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
          title: Sets image DPI fallback value
        unpaper_clean:
          nullable: true
          title: Controls the unpaper cleaning
          oneOf:
          - $ref: '#/components/schemas/UnpaperCleanEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        deskew:
          type: boolean
          nullable: true
          title: Enables deskew
        rotate_pages:
          type: boolean
          nullable: true
          title: Enables page rotation
        rotate_pages_threshold:
          type: number
          format: double
          minimum: 0.0
          nullable: true
          title: Sets the threshold for rotation of pages
        max_image_pixels:
          type: number
          format: double
          minimum: 0.0
          nullable: true
          title: Sets the maximum image size for decompression
        color_conversion_strategy:
          nullable: true
          title: Sets the Ghostscript color conversion strategy
          oneOf:
          - $ref: '#/components/schemas/ColorConversionStrategyEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        app_title:
          type: string
          nullable: true
          title: Application title
          maxLength: 48
        app_logo:
          type: string
          format: uri
          nullable: true
          title: Application logo
          pattern: (?:jpg|png|gif|svg)$
        barcodes_enabled:
          type: boolean
          nullable: true
          title: Enables barcode scanning
        barcode_enable_tiff_support:
          type: boolean
          nullable: true
          title: Enables barcode TIFF support
        barcode_string:
          type: string
          nullable: true
          title: Sets the barcode string
          maxLength: 32
        barcode_retain_split_pages:
          type: boolean
          nullable: true
          title: Retains split pages
        barcode_enable_asn:
          type: boolean
          nullable: true
          title: Enables ASN barcode
        barcode_asn_prefix:
          type: string
          nullable: true
          title: Sets the ASN barcode prefix
          maxLength: 32
        barcode_upscale:
          type: number
          format: double
          minimum: 1.0
          nullable: true
          title: Sets the barcode upscale factor
        barcode_dpi:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
          title: Sets the barcode DPI
        barcode_max_pages:
          type: integer
          maximum: 2147483647
          minimum: 1
          nullable: true
          title: Sets the maximum pages for barcode
        barcode_enable_tag:
          type: boolean
          nullable: true
          title: Enables tag barcode
      required:
      - barcode_tag_mapping
      - id
      - user_args
